<link rel="stylesheet" href="../static/css/style_searchresults.css" />
{% extends "base.html" %}
{% block title %} NTUAflix - "{{query}}" results{% endblock %}
{% block content %}
<div class="search-results">
  <div class="search-results-container">
    <div class="movies-section-restricted">
      <div class="movies-section">Search Results - "{{query}}"</div>
      <div class="movies-section2">
        {% for movie in results %}
        <a href="/MovieProfile/{{movie['id']}}" class="movie-thumbnail">
            <div class="thumbnail">
              <img class="thumbnail2" src={{movie['thumbnail']}} onerror="this.onerror=null; this.src='../static/images/no-image-found.png';"/>
            </div>
            <div class="movie-or-tv-series-title-goes-here">
              {% if movie['title'] == 'Null': %}
                No title
              {% else %}
                {{movie['title']}}
              {% endif %}
            </div>
        </a>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
